[project]
name = "fedprotrack"
version = "0.1.0"
description = "Federated Proactive Concept Identity Tracking with explicit legacy and Plan C FedProTrack variants"
# Public Phase 3 / E6 / CIFAR comparison entrypoints default to the legacy FedProTrack preset and expose Plan C variants explicitly.
# Recurrence / overlap research entrypoints may still opt into Plan C or adapter presets for targeted ablations.
# Recurrence-style CIFAR subset ablations may override shared aggregation locally without changing the global preset.
# Routed local training for feature-adapter models is experimental and remains opt-in.
# A prototype factorized_adapter model path now exists for Stage 2 experiments, and recurrence / overlap scripts expose it as opt-in factorized_local_shared / factorized_weighted_freeze / factorized_anchor_freeze / factorized_top2_freeze variants.
# Adapter rescue experiments now use explicit fingerprint_source / expert_update_policy / shared_update_policy knobs.
# Factorized Stage 2 experiments also expose slot-preserving warm-start and expert-anchor knobs for anti-collapse ablations.
# Factorized Stage 2 ablations may additionally expose a short primary-slot consolidation tail after multiroute anchor/freeze updates.
# Factorized consolidation ablations may further restrict that tail to head_only mode while keeping shared/private frozen.
# Factorized Stage 2 ablations may also expose routed_read_top_k / routed_read_temperature to sharpen routed read mixtures without changing the write path.
# Factorized Stage 2 ablations may further gate sharpened read with routed_read_only_on_ambiguity / routed_read_min_entropy / routed_read_min_secondary_weight / routed_read_max_primary_gap so only ambiguous posteriors are sharpened.
# Factorized Stage 2 ablations may also expose novelty_hysteresis_rounds so Phase A requires repeated novel evidence before spawning a new slot.
# CIFAR recurrence and overlap scripts emit selection/veto tables plus root-cause summaries for Stage 1 triage.
# Recurrence rescue scripts now include pre-adapter / hybrid / weighted-hybrid / centered-hybrid / attenuated-hybrid / double-raw-hybrid fingerprint ablations and per-round Phase A fp_loss logs.
# Rescue scaffolds also include a bootstrap raw+pre-adapter hybrid that stays raw-only while the memory bank has <=1 concept.
# A resumable adapter research loop script can now iterate scaffold mutations with keep/revert decisions over many rounds.
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.24",
    "river>=0.23",
    "matplotlib>=3.7",
    "pyyaml>=6.0",
    "scikit-learn>=1.3",
    "scipy>=1.10",
    "torch>=2.1",
]

[project.optional-dependencies]
dev = ["pytest>=7.0"]
real-data = ["torchvision>=0.16"]

[tool.pytest.ini_options]
# Keep cache inside the worktree so Windows PermissionError on system temp is avoided.
cache_dir = ".pytest_cache"
tmp_path_retention_policy = "none"
markers = [
    "slow: tests that may download datasets or build real-data feature caches",
]

[project.scripts]
fedprotrack = "fedprotrack.cli:main"

[tool.fedprotrack]
baseline_sync_note = "Oracle now means true-concept federated aggregation; FeSEM aliases IFCA and should be deduplicated in smoke comparisons; CIFAR smoke supports FedProTrack base/auto/calibrated/hybrid/update-ot/labelwise/hybrid-labelwise/hybrid-proto/hybrid-proto-early/hybrid-proto-firstagg/hybrid-proto-subagg modes, where calibrated uses fingerprint-similarity quantiles, hybrid mixes lightweight model-signature similarity, update-ot mixes lightweight OT over projected classifier rows, labelwise mixes label-wise batch-prototype-to-classifier-row OT routing, hybrid-labelwise combines global model-signature and label-wise prototype routing into Phase A, hybrid-proto adds prototype-aware post-aggregation classifier alignment, hybrid-proto-early strengthens that prototype alignment only in the earliest federation round before reverting to the steady-state mix, hybrid-proto-firstagg pre-aligns client models to concept prototypes before the earliest aggregation round, hybrid-proto-subagg tries subgroup-aware prototype pre-alignment before collapsing back to one concept aggregate, and the smoke table also includes FedAvg-FPTTrain as a same-local-training fairness control."
