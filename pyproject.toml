[project]
name = "fedprotrack"
version = "0.1.0"
description = "Federated Proactive Concept Identity Tracking"
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.24",
    "river>=0.23",
    "matplotlib>=3.7",
    "pyyaml>=6.0",
    "scikit-learn>=1.3",
    "scipy>=1.10",
    "torch>=2.1",
]

[project.optional-dependencies]
dev = ["pytest>=7.0"]
real-data = ["torchvision>=0.16"]

[tool.pytest.ini_options]
# Keep cache inside the worktree so Windows PermissionError on system temp is avoided.
cache_dir = ".pytest_cache"
tmp_path_retention_policy = "none"
markers = [
    "slow: tests that may download datasets or build real-data feature caches",
]

[project.scripts]
fedprotrack = "fedprotrack.cli:main"

[tool.fedprotrack]
baseline_sync_note = "Oracle now means true-concept federated aggregation; FeSEM aliases IFCA and should be deduplicated in smoke comparisons; CIFAR smoke supports FedProTrack base/auto/calibrated/hybrid/update-ot/labelwise/hybrid-labelwise/hybrid-proto/hybrid-proto-early/hybrid-proto-firstagg/hybrid-proto-subagg modes, where calibrated uses fingerprint-similarity quantiles, hybrid mixes lightweight model-signature similarity, update-ot mixes lightweight OT over projected classifier rows, labelwise mixes label-wise batch-prototype-to-classifier-row OT routing, hybrid-labelwise combines global model-signature and label-wise prototype routing into Phase A, hybrid-proto adds prototype-aware post-aggregation classifier alignment, hybrid-proto-early strengthens that prototype alignment only in the earliest federation round before reverting to the steady-state mix, hybrid-proto-firstagg pre-aligns client models to concept prototypes before the earliest aggregation round, hybrid-proto-subagg tries subgroup-aware prototype pre-alignment before collapsing back to one concept aggregate, and the smoke table also includes FedAvg-FPTTrain as a same-local-training fairness control."
